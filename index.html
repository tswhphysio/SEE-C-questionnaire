<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEE-C 老年人運動自我效能量表</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            line-height: 1.6;
            background: #f8f9fa;
        }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hospital-title { 
            text-align: center; 
            font-size: 16px; 
            color: #2c3e50; 
            font-weight: 600; 
            margin-bottom: 10px; 
            padding: 10px 0;
            border-bottom: 2px solid #3498db;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; text-align: center; margin-bottom: 30px; font-size: 16px; }
        .question { margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #3498db; }
        .q-number { font-weight: bold; color: #2c3e50; font-size: 18px; margin-bottom: 8px; }
        .q-text { color: #34495e; margin-bottom: 15px; }
        input[type=range] { width: 100%; height: 8px; border-radius: 5px; background: #ecf0f1; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 24px; height: 24px; background: #3498db; border-radius: 50%; cursor: pointer; }
        .score-display { font-size: 24px; font-weight: bold; color: #27ae60; text-align: center; margin: 30px 0; padding: 20px; background: #d5f4e6; border-radius: 8px; }
        .thank-you-text { 
            background: #e8f5e8; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border-left: 4px solid #27ae60;
            text-align: center;
        }
        .thank-you-text p { 
            margin: 0; 
            font-size: 18px; 
            color: #2c3e50; 
            font-weight: 500;
            line-height: 1.4;
        }
        button { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; }
        button:hover { background: #2980b9; }
        .hidden { display: none; }
        @media (max-width: 480px) { body { padding: 10px; } .container { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hospital-title">醫院管理局 新界西醫院聯網 物理治療部</div>
        <h1>SEE-C 老年人運動自我效能量表</h1>
        <p class="subtitle">請評估您克服以下障礙進行運動的信心（0=完全沒信心，10=非常有信心）</p>
        
        <form id="seeForm">
            <div class="question">
                <div class="q-number">1.</div>
                <div class="q-text">如果天氣不好使您感到困擾的時候</div>
                <input type="range" name="q1" min="0" max="10" value="5" step="1" id="q1">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q1-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">2.</div>
                <div class="q-text">如果您沒有家人支持的時候</div>
                <input type="range" name="q2" min="0" max="10" value="5" step="1" id="q2">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q2-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">3.</div>
                <div class="q-text">如果您感覺太累的時候</div>
                <input type="range" name="q3" min="0" max="10" value="5" step="1" id="q3">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q3-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">4.</div>
                <div class="q-text">如果您沒有運動夥伴的時候</div>
                <input type="range" name="q4" min="0" max="10" value="5" step="1" id="q4">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q4-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">5.</div>
                <div class="q-text">如果您太忙碌的時候</div>
                <input type="range" name="q5" min="0" max="10" value="5" step="1" id="q5">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q5-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">6.</div>
                <div class="q-text">如果您感覺自己太老的時候</div>
                <input type="range" name="q6" min="0" max="10" value="5" step="1" id="q6">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q6-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">7.</div>
                <div class="q-text">如果您身體不舒服的時候</div>
                <input type="range" name="q7" min="0" max="10" value="5" step="1" id="q7">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q7-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">8.</div>
                <div class="q-text">如果您沒有運動設備的時候</div>
                <input type="range" name="q8" min="0" max="10" value="5" step="1" id="q8">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q8-value">5</div>
            </div>

            <div class="question">
                <div class="q-number">9.</div>
                <div class="q-text">如果您沒有時間的時候</div>
                <input type="range" name="q9" min="0" max="10" value="5" step="1" id="q9">
                <div style="text-align:center; margin-top:5px; font-weight:bold;" id="q9-value">5</div>
            </div>

            <div class="score-display hidden" id="result">
                <div class="thank-you-text">
                    <p>非常感謝您完成了這份調查中所有的問題</p>
                    <p>請勿關閉此頁面</p>
                </div>
                <div>您的平均分數</div>
                <div id="meanScore">--</div>
                <div style="font-size:14px; color:#7f8c8d; margin-top:10px;">（滿分10分，分數越高表示對運動越有信心）</div>
            </div>

            <button type="button" onclick="calculateScore()" style="margin-top:20px;">計算結果</button>
        </form>
    </div>

    <script>
        // Real-time value display for each slider
        const sliders = document.querySelectorAll('input[type="range"]');
        sliders.forEach(slider => {
            slider.addEventListener('input', function() {
                document.getElementById(this.id + '-value').textContent = this.value;
            });
        });

        // Calculate and display mean score
        function calculateScore() {
            const scores = [];
            sliders.forEach(slider => {
                scores.push(parseInt(slider.value));
            });
            const meanScore = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
            
            document.getElementById('meanScore').textContent = meanScore;
            document.getElementById('result').classList.remove('hidden');
            document.querySelector('button').style.display = 'none';
            
            // Scroll to result
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
